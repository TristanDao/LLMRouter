# Config parameters for mfrouter training (Vietnamese safety routing)

data_path:
  query_data_train: 'artifacts/routing/query_data_train.jsonl'
  query_data_test: 'artifacts/routing/query_data_test.jsonl'
  query_embedding_data: 'artifacts/routing/query_embeddings.pt'
  routing_data_train: 'artifacts/routing/routing_data_train.jsonl'
  routing_data_test: 'artifacts/routing/routing_data_test.jsonl'
  llm_data: 'artifacts/routing/llm_data.json'
  llm_embedding_data: 'data/example_data/llm_candidates/default_llm_embeddings.json'

model_path:
  ini_model_path: ''
  save_model_path: 'saved_models/mfrouter/mfrouter_vni.pkl'

metric:
  weights:
    performance: 1
    cost: 0
    llm_judge: 0

hparam:
  latent_dim: 128
  text_dim: 1024           # Alibaba text-embedding-v3 dimension
  lr: 0.001
  epochs: 5
  batch_size: 64
  noise_alpha: 0.0
