# Answer Prompt for Response Generation
# Used by Steps 2-3: Qwen3-4B (local) and Gemini (API)
# Language: bilingual via $language variable (vi/en)
# Policy scope: ALL 12 policies (inline via {all_policies})
# Uses {placeholder} syntax for runtime substitution

template: |
  You are an AI assistant. Language: {language}

  SAFETY RULES:
  {all_policies}

  Instructions:
  - If query violates any policy above → refuse politely in {language}, cite the policy ID and name (e.g., "[1] Vingroup_xúc phạm"), explain briefly
