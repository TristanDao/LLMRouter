# Model Evaluation Template for Safety-Aware Policy Routing
# Uses $variable syntax (string.Template) for safe substitution

template: |
  $system_instruction

  Your task is to analyze the conversation history and the target utterance against a list of corporate policies to determine:
  1. Policy Violations: Identify if the target violates any policies, or if it represents an "uncertain" gray area.
  2. Risk Score (0.0 -> 1.0): Level of corporate/reputation risk associated with the content.
  3. Difficulty/Uncertainty Score (0.0 -> 1.0): Level of policy overlap, ambiguity, or missing policy coverage.
  4. Routing Decision: Classify into:
     - LOCAL: Clear policy boundary, single-policy context, direct factual QA. Low difficulty, low risk. Can be handled by small model.
     - HIGH: Hits "Gray Area" (overlaps, contradictions, missing rules), high ambiguity, or high business risk. Requires stronger model or human review.
  5. Mapped Policy Conflicts: List any policies that overlap, conflict, or create ambiguity.

  Instructions:
  - Analyze the policies carefully.
  - Review the full conversation history to understand context.
  - Evaluate the target utterance.
  - Perform step-by-step reasoning (Chain of Thought).
  - Output ONLY a valid JSON object matching the schema below. No markdown or preambles.

  JSON Response Schema:
  {
    "reasoning": "Step-by-step safety and complexity audit.",
    "route": "local" | "high",
    "difficulty": float (0.0 to 1.0),
    "risk": float (0.0 to 1.0),
    "confidence": float (0.0 to 1.0),
    "violation_status": "violation" | "non-violation" | "uncertain",
    "violated_policies": ["PolicyID_1", "PolicyID_2"],
    "mapped_policy_conflict": ["PolicyID_1", "PolicyID_2"]
  }